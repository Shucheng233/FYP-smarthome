<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FYP Smarthome - Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>FYP Smarthome - Dashboard</h1>
    <div class="status" id="sysStatus">System: ...</div>
  </header>

  <main class="grid">
    <!-- LLM Panel -->
    <section class="card">
      <h2>LLM</h2>
      <label>Prompt</label>
      <textarea id="llmPrompt" rows="4">Say hello in one short sentence.</textarea>
      <div class="row">
        <button id="btnLlm">Send</button>
        <button class="secondary" id="btnLlmClear">Clear</button>
      </div>
      <pre class="output" id="llmOut">...</pre>
    </section>

    <!-- Sensor Panel -->
    <section class="card">
      <h2>Sensors</h2>
      <div class="kv">
        <div>Temperature</div><div id="tVal">-</div>
        <div>Humidity</div><div id="hVal">-</div>
        <div>CO₂</div><div id="cVal">-</div>
        <div>Updated</div><div id="uVal">-</div>
      </div>
      <div class="row">
        <button class="secondary" id="btnSensorRefresh">Refresh</button>
      </div>

      <hr/>

      <h3>Manual Update (for testing)</h3>
      <div class="row">
        <input id="tIn" placeholder="temp (°C)" />
        <input id="hIn" placeholder="hum (%)" />
        <input id="cIn" placeholder="co2 (ppm)" />
        <button id="btnSensorUpdate">Update</button>
      </div>
      <pre class="output" id="sensorOut">...</pre>
    </section>

    <!-- IoT Control Panel -->
    <section class="card">
      <h2>IoT Control</h2>
      <div class="btnGrid">
        <button data-device="curtain" data-action="open">Curtain OPEN</button>
        <button data-device="curtain" data-action="close">Curtain CLOSE</button>
        <button data-device="fan" data-action="on">Fan ON</button>
        <button data-device="fan" data-action="off">Fan OFF</button>
      </div>
      <pre class="output" id="iotOut">...</pre>
    </section>

    <!-- STT / TTS Panel -->
    <section class="card">
      <h2>STT / TTS</h2>
      <p class="muted">Reserved for Phase C (not implemented yet).</p>
      <div class="row">
        <button class="secondary" id="btnSttStatus">STT status</button>
        <button class="secondary" id="btnTtsStatus">TTS status</button>
      </div>
      <pre class="output" id="sttTtsOut">...</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
