services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  coordinator:
    build:
      context: ./services/coordinator
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1
    volumes:
      # 你 app.py 里 mount 了 web，所以保留这个
      - ./web:/app/web:ro
    depends_on:
      - ollama

volumes:
  ollama_data:
