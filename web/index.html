<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FYP Smarthome - IoT Command</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>FYP Smarthome - IoT Command</h1>
    <div class="status" id="sysStatus">System: Loading...</div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>IoT Command</h2>
      <label>Natural Language Input</label>
      <textarea id="iotPrompt" rows="5" placeholder="e.g., Turn on the lights">Turn on the lights</textarea>
      <div class="row">
        <button id="btnIot">Generate Commands</button>
        <button class="secondary" id="btnIotClear">Clear</button>
      </div>

      <h3>Parsed Commands</h3>
      <pre class="output" id="iotOut">Commands will appear here...</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
